# Reverse proxy for a single-domain production setup.
# The frontend stays on mikroliving.id and API traffic is forwarded from /api/v1/.

server {
    listen 80;
    server_name mikroliving.id www.mikroliving.id;

    return 301 https://mikroliving.id$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mikroliving.id www.mikroliving.id;

    ssl_certificate /etc/letsencrypt/live/mikroliving.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mikroliving.id/privkey.pem;

    client_max_body_size 20M;

    location /api/v1/ {
        proxy_pass http://127.0.0.1:5000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
